#spring datasource
#needs to be changed
spring.datasource.url=jdbc:mysql://localhost:3306/Latency?useSSL=false
spring.datasource.username=root
spring.datasource.password=root
server.port=8094

## Hibernate Properties
# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL5InnoDBDialect

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto = update


# This algorithm assigns equal weight to all the historical records
dlms.algorithms[0].name=algo1
dlms.algorithms[0].className=eu.melodic.dlms.algorithmRunners.Algo_AverageWeightRunner
dlms.algorithms[0].interval=600 
#argument order is: update all before the specified time interval (integer), update number of records (integer), update based on time or records (string) => can be "time" or "numRecords"
#e.g., 600, 1000, numRecords => implies update all the records 600 seconds from the current time, 1000 records, and the update is done based on the number of records in this instance
#dlms.algorithms[0].arguments=800000,1000,numRecords
dlms.algorithms[0].arguments=800000,1000,time
dlms.algorithms[0].weight=0.1
dlms.algorithms[0].camelId=algo1_CAMEL_ID

