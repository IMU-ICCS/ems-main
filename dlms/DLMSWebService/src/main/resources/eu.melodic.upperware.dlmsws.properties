server.port: 14000
management.server.address: 127.0.0.1
alluxio.master.hostname: 127.0.0.1
alluxio.master.address: master
alluxio.server.conf.file: /opt/alluxio/conf/alluxio-site.properties
spring.datasource.url=jdbc:mysql://localhost:3306/dlms?useSSL=false
## below line to prevent  Time Zone Issue in mysql
#spring.datasource.url=jdbc:mysql://localhost:3306/dlms?useSSL=false&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.properties.hibernate.id.new_generator_mappings = false
spring.jpa.properties.hibernate.format_sql = true
spring.jpa.hibernate.ddl-auto = create-drop
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL5InnoDBDialect

# communication with esb
esb.url=http://127.0.0.1:14000/