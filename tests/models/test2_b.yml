apiVersion: nebulous/v1
kind: MetricModel
metadata:
  name: 'Sample Nebulous metric model'
spec:
  components:
    - name: a_component
      requirements:
        - name: an_slo
          type: slo
          constraint: 'cpu_util_prct > 80'
        - name: another_slo
          type: slo
          constraint: 'response_time > 200'
        - name: cpu_too_high
          type: slo
          constraint: 'significant_cpu_util_instance > 0'
      metrics:
        - name: cpu_util_prct
          formula: 'mean( cpu_util_instance ) * my_sgn( mean( cpu_util_instance ) )'
          grouping: per_zone
          window: 'sliding 5 min'
          output: 'all 30 sec'
        - name: cpu_util_instance
          busy-status: true
          #sensor: 'netdata system.cpu'
          #sensor: 'netdata k8s.cgroup.cpu'
          sensor:
            type: netdata
            config:
#              endpoint: /api/v2/data
              scope_contexts: system.cpu
#              namespace: 'default'
              components: 'app-simple-app-prometheus'
              results-aggregation: SUM
#              dimensions: '*'
#              after: -1
#              group: average
#              format: ssv
#              chart_label_key: k8s_pod_name,k8s_namespace
#              chart_labels_filter: k8s_pod_name:netdata-child-gm9wc,k8s_namespace:default
          output: 'all 10 sec'

        - name: response_time
          busy-status: true
          sensor:
            type: prometheus
            config:
              metric: 'request_processing_seconds_sum'
              components: 'app-simple-app-prometheus'
              port: 9000
              endpoint: /
              delay: 0                    # Initial delay
              intervalPeriod: 30
              intervalUnit: 'seconds'     # See 'Interval' enum for valid values

        - name: significant_cpu_util_instance
          busy-status: true
          formula: 'cpu_util_instance - DYNAMIC_LIMIT'
          grouping: per_instance

#        - name: DYNAMIC_LIMIT
#          type: constant
#          initial: 0
        - name: DYNAMIC_LIMIT
          sensor: constant 0.0

        - name: mvv.DYNAMIC_LIMIT
          formula: 'mean(cpu_util_instance) - std(cpu_util_instance)'
          output: 'last 10 sec'

  scopes:
    - name: a_scope
      components: [ 'a_component' ]

functions:
  - name: my_sgn
    expression: 'if(n=0, 0, abs( n ) / n)'
    arguments: [ n ]
