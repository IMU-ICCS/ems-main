    - docker tag $LOCAL_REPO/melodic/metasolver:unknown $CI_REGISTRY_IMAGE/metasolver:$CI_COMMIT_BRANCH
    - docker push $CI_REGISTRY_IMAGE/metasolver:$CI_COMMIT_BRANCH

