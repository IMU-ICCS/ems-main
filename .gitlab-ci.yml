    - docker tag $LOCAL_REPO/melodic/jwtserver:unknown $CI_REGISTRY_IMAGE/jwt-server:$CI_COMMIT_BRANCH
    - docker push $CI_REGISTRY_IMAGE/jwt-server:$CI_COMMIT_BRANCH


