build-basic-dependencies:melodic-upperware:
  stage: build-basic-dependencies
  image: $MAVEN_IMAGE
  script:
    - $MELODIC_UPPERWARE_CLI -Pwithout-docker clean install
  artifacts:
    paths:
      - /builds/melodic/melodic-upperware/maven_repo/org/ow2/paasage/upperware/

build-required-part1:upperware-metamodel:
  stage: build-required-part1
  image: $MAVEN_IMAGE
  script:
    - $UPPERWARE_METAMODEL_CLI -Pwithout-docker clean install
  artifacts:
    paths:
      - /builds/melodic/melodic-upperware/maven_repo/org/ow2/paasage/upperware-metamodel/

build-required-part2:jwt-commons:
  stage: build-required-part2
  image: $MAVEN_IMAGE
  script:
    - $JWT_COMMONS_CLI -Pwithout-docker clean install
  artifacts:
    paths:
      - /builds/melodic/melodic-upperware/maven_repo/org/ow2/paasage/jwt-commons/

build-required-part2:melodic-commons:
  stage: build-required-part2
  image: $MAVEN_IMAGE
  script:
    - $MELODIC_COMMONS_CLI -Pwithout-docker clean install
  artifacts:
    paths:
      - /builds/melodic/melodic-upperware/maven_repo/org/ow2/paasage/melodic-commons/

build-required-part3:melodic-cache:
  stage: build-required-part3
  image: $MAVEN_IMAGE
  script:
    - $MELODIC_CACHE_CLI -Pwithout-docker clean install
  artifacts:
    paths:
      - /builds/melodic/melodic-upperware/maven_repo/org/ow2/paasage/melodic-cache/

build-required-part3:zpp-solver:
  stage: build-required-part3
  image: $MAVEN_IMAGE
  script:
    - $ZPP_SOLVER_CLI -Pwithout-docker clean install
  artifacts:
    paths:
      - /builds/melodic/melodic-upperware/maven_repo/org/ow2/paasage/zpp-solver/


build-required-part3:ems:
  stage: build-required-part3
  image: $MAVEN_IMAGE
  script:
    - $EMS_CLI -Pwithout-docker clean install
  artifacts:
    paths:
      - $CI_PROJECT_DIR/event-management/bin
      - $CI_PROJECT_DIR/event-management/config-files
      - $CI_PROJECT_DIR/event-management/util/target
      - $CI_PROJECT_DIR/event-management/translator/target
      - $CI_PROJECT_DIR/event-management/broker-client/target
      - $CI_PROJECT_DIR/event-management/broker-cep/target
      - $CI_PROJECT_DIR/event-management/baguette-client/target
      - $CI_PROJECT_DIR/event-management/baguette-client-install/target
      - $CI_PROJECT_DIR/event-management/baguette-server/target
      - $CI_PROJECT_DIR/event-management/control-service/target
      - $CI_PROJECT_DIR/event-management/control-service/src/main/resources/public


