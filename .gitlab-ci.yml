variables:
  DOCKER_PUSH: "false"
  LOCAL_REPO: "127.0.0.1:5000"
  DOCKER_REPO: "gitlab.ow2.org:4567"
  MAVEN_IMAGE: "maven:3.6.3-jdk-8"
  DOCKER_DIND_IMAGE: "docker:20.10.17"
  DOCKER_DIND_SERVICE: "$DOCKER_DIND_IMAGE-dind"
  DOCKER_DRIVER: overlay
  DOCKER_TLS_CERTDIR: "/certs"

  MAVEN_OPTS: "-Xmx2048m -Xms2048m"
  SKIP_TESTS: "true"

  DOCKER_CLI: "docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v $CI_PROJECT_DIR/maven_repo:/root/.m2 -w /usr/src/mymaven -v $CI_PROJECT_DIR:/usr/src/mymaven --env-file .env.list $MAVEN_IMAGE"
  MELODIC_UPPERWARE_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -f pom.xml"
  UPPERWARE_METAMODEL_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -f upperware_metamodel/pom.xml"
  JWT_COMMONS_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -f jwt-commons/pom.xml"
  MELODIC_COMMONS_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -f melodic-commons/pom.xml"
  MELODIC_CACHE_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -f melodic-cache/pom.xml"

  JWT_SERVER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f jwt-server/pom.xml"
  UTILITY_GENERATOR_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -f utility-generator/pom.xml"
  UG_STANDALONE_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -f utility-generator-standalone/pom.xml"
  MC_STANDALONE_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -f melodic-cache-standalone/pom.xml"

  ZPP_SOLVER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -f zpp-solver/pom.xml"

  ADAPTER_SERVER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f adapter/pom.xml"
  CP_GENERATOR_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -U -f cp_generator/pom.xml"

  CP_PARSER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f zpp-solver/cp-parser/pom.xml"
  CP_SOLVER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f cp-solver/pom.xml"
  GEN_SOLVER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f zpp-solver/genetic-solver/pom.xml"
  NC_SOLVER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f zpp-solver/node-candidates-solver/pom.xml"
  PT_SOLVER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f zpp-solver/pt-solver/pom.xml"
  MCTS_SOLVER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f zpp-solver/mcts-solver/pom.xml"

  EMS_CLI: "mvn --batch-mode -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f event-management/pom.xml"
  EMS_BROKER_CLIENT_CLI: "mvn --batch-mode -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f event-management/broker-client/pom.xml"
  EMS_UTIL_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f event-management/util/pom.xml"

  METASOLVER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f meta_solver/pom.xml"
  MQ_ADAPTER_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f mq-http-adapter/pom.xml"
  GUI_BACKEND_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -U -f gui-backend/pom.xml"

  FUNCTIONIZER_TESTING_TOOL_CLI: "mvn --batch-mode -N -Dmaven.test.skip=$SKIP_TESTS -Ddocker.push=false -f functionizer-testing-tool/pom.xml"

cache:
  paths:
    - maven_repo/

before_script:
  - mkdir -p $HOME/.m2
  - echo '<settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
    https://maven.apache.org/xsd/settings-1.0.0.xsd">
    <localRepository>'$CI_PROJECT_DIR'/maven_repo</localRepository>
    </settings>' > $HOME/.m2/settings.xml
  - echo "MAVEN_OPTS=$MAVEN_OPTS" > $CI_PROJECT_DIR/.env.list

after_script:
  - echo '=========================================================================='
  - docker image ls
  - echo '=========================================================================='

stages:
  - build-basic-dependencies
  - build-required-part1
  - build-required-part2
  - build
  - deployMavenRegistry
  - deployDockerRegistry
  - deployDockerRegistry-solvers

build-basic-dependencies:melodic-upperware:
  stage: build-basic-dependencies
  image: $MAVEN_IMAGE
  script:
    - $MELODIC_UPPERWARE_CLI -Pwithout-docker clean install
  artifacts:
    expire_in: 1 week
    paths:
      - /builds/melodic/melodic-upperware/maven_repo/org/ow2/paasage/upperware/

# In this section we build libraries (.jar files) that will be used as dependencies for further modules
# Note that all artifacts are passed to further stages unless they are narrowed down by 'dependencies' flag
build-required-part1:upperware-metamodel:
  stage: build-required-part1
  image: $MAVEN_IMAGE
  script:
    - $UPPERWARE_METAMODEL_CLI -Pwithout-docker clean install
  artifacts:
    expire_in: 1 week
    paths:
      - $CI_PROJECT_DIR/maven_repo/org/ow2/paasage/upperware-metamodel/

build-required-part1:jwt-commons:
  stage: build-required-part1
  image: $MAVEN_IMAGE
  script:
    - $JWT_COMMONS_CLI -Pwithout-docker clean install
  artifacts:
    expire_in: 1 week
    paths:
      - $CI_PROJECT_DIR/maven_repo/org/ow2/paasage/jwt-commons/

build-required-part1:melodic-cache:
  stage: build-required-part1
  image: $MAVEN_IMAGE
  script:
    - $MELODIC_CACHE_CLI -Pwithout-docker clean install
  artifacts:
    expire_in: 1 week
    paths:
      - $CI_PROJECT_DIR/maven_repo/org/ow2/paasage/melodic-cache/

build-required-part1:cp-parser:
  stage: build-required-part1
  image: $MAVEN_IMAGE
  script:
    - $CP_PARSER_CLI -Pwithout-docker clean install
  artifacts:
    expire_in: 1 week
    paths:
      - $CI_PROJECT_DIR/maven_repo/eu/melodic/cp-parser/

build-required-part1:ems-util:
  stage: build-required-part1
  image: $MAVEN_IMAGE
  script:
    - $EMS_UTIL_CLI -Pwithout-docker -P!build-web-admin clean install
  artifacts:
    paths:
      - $CI_PROJECT_DIR/maven_repo/eu/melodic/event/util/

# Note that we use non-recusrsive flag
build-required-part1:ems:
  stage: build-required-part1
  image: $MAVEN_IMAGE
  script:
    - $EMS_CLI -N -Pwithout-docker -P!build-web-admin clean install
  artifacts:
    paths:
      - $CI_PROJECT_DIR/maven_repo/eu/melodic/event/event-management/

build-required-part2:ems-broker-client:
  stage: build-required-part2
  image: $MAVEN_IMAGE
  script:
    - $EMS_BROKER_CLIENT_CLI -Pwithout-docker -P!build-web-admin  clean install
  dependencies:
    - build-required-part1:ems
    - build-required-part1:ems-util
  artifacts:
    paths:
      - $CI_PROJECT_DIR/maven_repo/eu/melodic/event/broker-client/

build-required-part2:melodic-commons:
  stage: build-required-part2
  image: $MAVEN_IMAGE
  script:
    - $MELODIC_COMMONS_CLI -Pwithout-docker clean install
  dependencies:
    - build-required-part1:upperware-metamodel
  artifacts:
    expire_in: 1 week
    paths:
      - $CI_PROJECT_DIR/maven_repo/org/ow2/paasage/melodic-commons/

build-required-part2:utility-generator:
  stage: build-required-part2
  image: $MAVEN_IMAGE
  script:
    - $UTILITY_GENERATOR_CLI -Pwithout-docker clean install
  dependencies:
    - build-required-part1:jwt-commons
    - build-required-part1:upperware-metamodel
    - build-required-part1:melodic-cache
  artifacts:
    expire_in: 1 week
    paths:
      - $CI_PROJECT_DIR/maven_repo/org/ow2/paasage/utility-generator/


# In this section we deploy libraries built earlier to maven repository

deployMavenRegistry:broker-client:
  stage: deployMavenRegistry
  only:
    - morphemic-rc4.0
  image: $DOCKER_DIND_IMAGE
  services:
    - $DOCKER_DIND_SERVICE
  dependencies:
    - build-required-part1:ems
    - build-required-part2:ems-broker-client
  script:
    - $DOCKER_CLI $EMS_BROKER_CLIENT_CLI deploy

# In this section we build modules, fetch libraries from earlier stages, build and push docker images

deployDockerRegistry:utility-generator-standalone:
  stage: deployDockerRegistry
  only:
    - morphemic-rc4.0
  image: $DOCKER_DIND_IMAGE
  services:
    - $DOCKER_DIND_SERVICE
  dependencies:
    - build-required-part2:utility-generator
  script:
    - $DOCKER_CLI $UG_STANDALONE_CLI -Ddocker.imagePrefix=melodic/ clean install
    - echo "$K8S_SECRET_DOCKER_PASSWORD" | docker login $CI_REGISTRY -u $K8S_SECRET_DOCKER_USER --password-stdin
    - docker tag $LOCAL_REPO/melodic/ug-standalone:unknown $CI_REGISTRY_IMAGE/ug-standalone:$CI_COMMIT_BRANCH
    - docker push $CI_REGISTRY_IMAGE/ug-standalone:$CI_COMMIT_BRANCH

deployDockerRegistry:melodic-cache-standalone:
  stage: deployDockerRegistry
  only:
    - morphemic-rc4.0
  image: $DOCKER_DIND_IMAGE
  services:
    - $DOCKER_DIND_SERVICE
  dependencies:
    - build-required-part1:melodic-cache
  script:
    - $DOCKER_CLI $MC_STANDALONE_CLI -Ddocker.imagePrefix=melodic/ clean install
    - echo "$K8S_SECRET_DOCKER_PASSWORD" | docker login $CI_REGISTRY -u $K8S_SECRET_DOCKER_USER --password-stdin
    - docker tag $LOCAL_REPO/melodic/melodiccachestandalone:unknown $CI_REGISTRY_IMAGE/melodiccachestandalone:$CI_COMMIT_BRANCH
    - docker push $CI_REGISTRY_IMAGE/melodiccachestandalone:$CI_COMMIT_BRANCH

deployDockerRegistry:adapter:
  stage: deployDockerRegistry
  only:
    - morphemic-rc4.0
  image: $DOCKER_DIND_IMAGE
  services:
    - $DOCKER_DIND_SERVICE
  dependencies:
    - build-required-part1:jwt-commons
    - build-required-part1:upperware-metamodel
    - build-required-part2:melodic-commons
    - build-required-part2:ems-broker-client
    - build-required-part1:ems
  script:
    - $DOCKER_CLI $ADAPTER_SERVER_CLI -Ddocker.imagePrefix=melodic/ clean install
    - echo "$K8S_SECRET_DOCKER_PASSWORD" | docker login $CI_REGISTRY -u $K8S_SECRET_DOCKER_USER --password-stdin
    - docker tag $LOCAL_REPO/melodic/adapter:unknown $CI_REGISTRY_IMAGE/adapter:$CI_COMMIT_BRANCH
    - docker push $CI_REGISTRY_IMAGE/adapter:$CI_COMMIT_BRANCH

deployDockerRegistry:cp-generator:
  stage: deployDockerRegistry
  only:
    - morphemic-rc4.0
  image: $DOCKER_DIND_IMAGE
  services:
    - $DOCKER_DIND_SERVICE
  dependencies:
    - build-required-part1:jwt-commons
    - build-required-part1:upperware-metamodel
    - build-required-part1:melodic-cache
    - build-required-part2:melodic-commons

  script:
    - $DOCKER_CLI $CP_GENERATOR_CLI -Ddocker.imagePrefix=melodic/ clean install
    - echo "$K8S_SECRET_DOCKER_PASSWORD" | docker login $CI_REGISTRY -u $K8S_SECRET_DOCKER_USER --password-stdin
    - docker tag $LOCAL_REPO/melodic/generator:unknown $CI_REGISTRY_IMAGE/generator:$CI_COMMIT_BRANCH
    - docker push $CI_REGISTRY_IMAGE/generator:$CI_COMMIT_BRANCH

deployDockerRegistry:cp-solver:
  stage: deployDockerRegistry
  only:
    - morphemic-rc4.0
  image: $DOCKER_DIND_IMAGE
  dependencies:
    - build-required-part1:jwt-commons
    - build-required-part1:upperware-metamodel
    - build-required-part1:melodic-cache
    - build-required-part2:melodic-commons
    - build-required-part2:utility-generator
  services:
    - $DOCKER_DIND_SERVICE
  script:
    - $DOCKER_CLI $CP_SOLVER_CLI -Ddocker.imagePrefix=melodic/ clean install
    - echo "$K8S_SECRET_DOCKER_PASSWORD" | docker login $CI_REGISTRY -u $K8S_SECRET_DOCKER_USER --password-stdin
    - docker tag $LOCAL_REPO/melodic/cpsolver:unknown $CI_REGISTRY_IMAGE/cpsolver:$CI_COMMIT_BRANCH
    - docker push $CI_REGISTRY_IMAGE/cpsolver:$CI_COMMIT_BRANCH

deployDockerRegistry:ems-server:
  stage: deployDockerRegistry
  only:
