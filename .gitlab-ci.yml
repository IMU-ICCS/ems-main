# NOTE on pipeline #3
# as 'mvn deploy' command run all previous steps as well (clean, install, tests etc.)
# the module is rebuilt from scratch no matter what the previous steps were
# Note that there is no need to push built jars to package registry unless they are needed
# inside other pipelines
buildAndDeployJars:broker-client:
  stage: buildAndDeployJars
  only:
    - morphemic-rc4.0
    - SALAAS
  image: $MAVEN_IMAGE
  needs:
    - build-required-part1:ems
    - build-required-part1:ems-util
  script:
    - $EMS_BROKER_CLIENT_CLI -Pwithout-docker -P!build-web-admin deploy

# NOTE on pipeline #4
# deployDocker steps need to have dependencies to the previously built jars and other files needed to built docker image
# default starting point is $CI_PROJECT_DIR/
# Only initial module files ($CI_PROJECT_DIR/your_module_name) and files defined before as artifacts are visible here
# deployDocker step should have defined dependencies array of previous steps
# empty array means that no previous jobs artifacts are needed
# (for example when building python containers that don't require building jars)
deployDocker:utility-generator-standalone:
  stage: deployDocker
  only:
    - morphemic-rc4.0
    - SALAAS
  image: $DOCKER_DIND_IMAGE
  services:
    - $DOCKER_DIND_SERVICE
  needs:
    - buildJars:utility-generator-standalone
  script:
    - cd utility-generator-standalone/src/main/docker/
    - cp /builds/melodic/melodic-upperware/maven_repo/org/ow2/paasage/utility-generator-standalone/6.0.0-SNAPSHOT/utility-generator-standalone-6.0.0-SNAPSHOT.jar ./utility-generator-standalone.jar
    - docker build -t ug-standalone -f ./Dockerfile .
    - echo "$K8S_SECRET_DOCKER_PASSWORD" | docker login $CI_REGISTRY -u $K8S_SECRET_DOCKER_USER --password-stdin
    - docker tag ug-standalone:latest $CI_REGISTRY_IMAGE/ug-standalone:$CI_COMMIT_BRANCH
    - docker push $CI_REGISTRY_IMAGE/ug-standalone:$CI_COMMIT_BRANCH

