  script:
    - $ZPP_SOLVER_CLI -N -Pwithout-docker clean install
  artifacts:
    paths:
      - $CI_PROJECT_DIR/maven_repo/org/ow2/paasage/zpp-solver/

build-required-part2:ems-broker-client:
  stage: build-required-part2
  image: $MAVEN_IMAGE
  script:
    - $EMS_BROKER_CLIENT_CLI -Pwithout-docker -P!build-web-admin  clean install
  needs:
    - build-required-part1:ems
    - build-required-part1:ems-util
  artifacts:
    paths:
      - $CI_PROJECT_DIR/maven_repo/eu/melodic/event/broker-client/

build-required-part2:melodic-commons:
  stage: build-required-part2
