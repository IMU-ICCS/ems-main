# In this section we deploy libraries
# Note that they are rebuilt so if you don'tneed them later in the pipeline, there is no need to have building stage
buildAndDeployJars:broker-client:
  stage: buildAndDeployJars
  only:
    - morphemic-rc4.0
  image: $MAVEN_IMAGE
  dependencies:
    - build-required-part1:ems
    - build-required-part2:ems-broker-client
  script:
    - $EMS_BROKER_CLIENT_CLI -Pwithout-docker -P!build-web-admin deploy

# In this section we build modules, fetch libraries from earlier stages, build and push docker images

deployDockerRegistry:utility-generator-standalone:
  stage: deployDockerRegistry
  only:
    - morphemic-rc4.0
  image: $DOCKER_DIND_IMAGE
  services:
    - $DOCKER_DIND_SERVICE
  dependencies:
    - buildJars:utility-generator-standalone
  script:
    - cd utility-generator-standalone/src/main/docker/
    - cp /builds/melodic/melodic/maven_repo/eu/melodic/utility-generator-standalone/6.0.0-SNAPSHOT/utility-generator-standalone-6.0.0-SNAPSHOT.jar ./
    - docker build -t ug-standalone -f ./Dockerfile .
    - echo "$K8S_SECRET_DOCKER_PASSWORD" | docker login $CI_REGISTRY -u $K8S_SECRET_DOCKER_USER --password-stdin
    - docker tag ug-standalone:latest $CI_REGISTRY_IMAGE/ug-standalone:$CI_COMMIT_BRANCH
    - docker push $CI_REGISTRY_IMAGE/ug-standalone:$CI_COMMIT_BRANCH

