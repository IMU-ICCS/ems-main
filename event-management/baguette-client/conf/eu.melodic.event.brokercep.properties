control.password-encoder = eu.passage.upperware.commons.passwords.IdentityPasswordEncoder

# Non-SSL Broker settings
#Use this Baguette client Broker-CEP configuration when testing in the same machine with Baguette Server (which also uses port 61616)
brokercep.broker-name = broker
brokercep.broker-port = 61615
brokercep.connector-port = 1088
# Don't use in Upperware
#brokercep.bypass-local-broker = true

# The URL the broker service will try to bind to
brokercep.broker-url = tcp://0.0.0.0:${brokercep.broker-port}
# The broker url that must be used in BrokerCepConsumer & in clients
brokercep.broker-url-for-consumer = tcp://localhost:${brokercep.broker-port}
brokercep.broker-url-for-clients = tcp://%{PUBLIC_IP}%:${brokercep.broker-port}
#brokercep.broker-url-for-clients = tcp://%{DEFAULT_IP}%:${brokercep.broker-port}
# Must be a public IP address

# SSL Broker settings
#brokercep.broker-url = ssl://0.0.0.0:${brokercep.broker-port}
brokercep.broker-url-properties = transport.daemon=true&transport.trace=false&transport.useKeepAlive=true&transport.useInactivityMonitor=false&transport.needClientAuth=${brokercep.ssl.client-auth.required}&verifyHostName=true
brokercep.ssl.client-auth.required = true
#brokercep.broker-url-for-consumer = ssl://localhost:${brokercep.broker-port}
#brokercep.broker-url-for-clients = ssl://%{PUBLIC_IP}%:${brokercep.broker-port}
#brokercep.broker-url-for-clients = ssl://%{DEFAULT_IP}%:${brokercep.broker-port}
# Must be a public IP address

# Key store
brokercep.ssl.truststore.file = ${MELODIC_CONFIG_DIR}/broker-truststore.p12
brokercep.ssl.truststore.type = PKCS12
brokercep.ssl.truststore.password = melodic
# Trust store
brokercep.ssl.keystore.file = ${MELODIC_CONFIG_DIR}/broker-keystore.p12
brokercep.ssl.keystore.type = PKCS12
brokercep.ssl.keystore.password = melodic

# Authentication and Authorization settings
brokercep.authentication-enabled = false
brokercep.additional-broker-credentials = xxx/111, yyy/222
brokercep.authorization-enabled = false

# Broker instance settings
brokercep.broker-persistence-enabled = false
brokercep.broker-using-jmx = true
brokercep.broker-advisory-support-enabled = true
brokercep.broker-using-shutdown-hook = false

# Memory usage limit
brokercep.usage.memory.jvm-heap-percentage = 20
#brokercep.usage.memory.size = 134217728
