# Common and non-SSL Broker settings
#brokercep.broker-name = broker
#brokercep.connector-port = 1099
#brokercep.broker-url = tcp://localhost:61616
# Don't use in Upperware
#brokercep.bypass-local-broker = true

# SSL Broker settings
#brokercep.ssl.enable = false
brokercep.broker-url = ssl://localhost:61616
brokercep.broker-url-properties = transport.daemon=true&transport.trace=false&transport.useKeepAlive=false&transport.useInactivityMonitor=false&transport.needClientAuth=${brokercep.ssl.client-auth.required}
# Key store
brokercep.ssl.truststore.file = ${MELODIC_CONFIG_DIR}/broker-truststore.p12
brokercep.ssl.truststore.type = PKCS12
brokercep.ssl.truststore.password = melodic
# Trust store
brokercep.ssl.keystore.file = ${MELODIC_CONFIG_DIR}/broker-keystore.p12
brokercep.ssl.keystore.type = PKCS12
brokercep.ssl.keystore.password = melodic
# Client authentication is required
# XXX:DEL-IF: not really needed in client authentication
brokercep.ssl.client-auth.required = false

# Memory usage limit
brokercep.usage.memory.jvm-heap-percentage = 20
#brokercep.usage.memory.size = 134217728