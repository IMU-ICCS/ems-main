# Baguette Server configuration

#coordinator.class = eu.melodic.event.baguette.server.coordinator.ThreeLevelSegmentCoordinator
#coordinator.class = eu.melodic.event.baguette.server.coordinator.TwoLevelCoordinator
coordinator.class = eu.melodic.event.baguette.server.coordinator.NoopCoordinator
