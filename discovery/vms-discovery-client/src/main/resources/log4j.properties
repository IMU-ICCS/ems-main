# Root logger option
log4j.rootLogger=INFO, stdout

# Class logger options
log4j.logger.eu.melodic.upperware.eventmgnt=DEBUG
log4j.logger.eu.melodic.upperware.eventmgnt.Sshc=DEBUG

# Direct log messages to stdout
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
#log4j.appender.stdout.layout.ConversionPattern=%m%n
log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %C{36} - %m%n