name: Build EMS Core Platform (Server + Client)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "r*"
      - "test"

permissions:
  contents: read
  packages: write

env:
  CORE_VERSION: 8.0.0-snapshot
  REGISTRY: ghcr.io/imu-iccs

jobs:

  # -------------------------------------------------------
  # 1. Collect metadata
  # -------------------------------------------------------
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      safe_time: ${{ steps.meta.outputs.safe_time }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          COMMIT_DATE=$(git show -s --format=%cI HEAD)
          SAFE_TIME=$(date -u -d "$COMMIT_DATE" +"%Y%m%dT%H%M%SZ")
          echo "safe_time=$SAFE_TIME" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------
  # 2. Build and push per-platform images (parallel matrix)
  # -------------------------------------------------------
  build:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch_tag: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch_tag: arm64
            runner: ubuntu-24.04-arm     # native arm64 runner - no QEMU emulation
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform }})
        run: |
          export CORE_VERSION="${{ env.CORE_VERSION }}"
          export REGISTRY="${{ env.REGISTRY }}"
          export COMMIT_SHA="${{ needs.metadata.outputs.commit_sha }}"
          export COMMIT_SAFE_TIME="${{ needs.metadata.outputs.safe_time }}"
          export PLATFORM="${{ matrix.platform }}"
          export ARCH_TAG="${{ matrix.arch_tag }}"

          docker buildx bake \
            --push

  # -------------------------------------------------------
  # 3. Merge per-arch images into multi-platform manifests
  # -------------------------------------------------------
  merge:
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          set -eux

          CORE_VERSION="${{ env.CORE_VERSION }}"
          REGISTRY="${{ env.REGISTRY }}"
          COMMIT_SHA="${{ needs.metadata.outputs.commit_sha }}"
          COMMIT_SAFE_TIME="${{ needs.metadata.outputs.safe_time }}"

          for IMAGE in ems-server-core-builder ems-server ems-client; do
            SRC_AMD64="${REGISTRY}/${IMAGE}:${COMMIT_SHA}-amd64"
            SRC_ARM64="${REGISTRY}/${IMAGE}:${COMMIT_SHA}-arm64"

            docker buildx imagetools create \
              -t "${REGISTRY}/${IMAGE}:${CORE_VERSION}" \
              -t "${REGISTRY}/${IMAGE}:latest" \
              -t "${REGISTRY}/${IMAGE}:${COMMIT_SHA}" \
              -t "${REGISTRY}/${IMAGE}:${COMMIT_SHA}-${COMMIT_SAFE_TIME}" \
              "${SRC_AMD64}" "${SRC_ARM64}"
          done

  # -------------------------------------------------------
  # 4. Clean up temporary per-arch tags
  # -------------------------------------------------------
  cleanup:
    needs: [metadata, merge]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Delete temporary arch-suffixed tags
        uses: actions/delete-package-versions@v5
        with:
          package-name: "ems-server-core-builder"
          package-type: container
          min-versions-to-keep: 0
          delete-only-untagged-versions: false
        continue-on-error: true