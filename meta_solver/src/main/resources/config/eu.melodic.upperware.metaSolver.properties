#### Enable Web security ####
#melodic.security.enabled=false

#### Communication with ESB ####
#esb.enabled=false
esb.url=http://localhost:8088/api/metaSolver/deploymentProcess
#### Mock ESB endpoint in MetaSolver - For testing only
#esb.url=http://localhost:8092/esbTest

#### Communication with EMS ####
ems-url=http://localhost:8111/cpModelJson
ems-broker-username=aaa
ems-broker-password=111
#ems-broker-certificate=
#NOTE: EMS broker truststore is set in run.bat or run.sh

#### REST interface port ####
server.port=8092

#### Pub/Sub configuration for Metric Values and Scale events ####
pubsub.on=true

# #### Settings for 'localhost'
# #pubsub.topics[0].name = MetaSolver_METRIC_topic
# pubsub.topics[0].name = AverageResponseTime
# #pubsub.topics[0].url = DEFAULT_BROKER_URL
# #pubsub.topics[0].url = tcp://172.24.29.139:61616
# pubsub.topics[0].url = tcp://192.168.99.100:61616
# #pubsub.topics[0].url = tcp://34.241.234.14:61616	The hackaton 2nd-level VM broker
# pubsub.topics[0].clientId = Metasolver-Metric-Value-Monitor-Bean-client
# pubsub.topics[0].type = MVV
# 
# pubsub.topics[1].name = AverageResponseTimeHigh1m
# #pubsub.topics[1].url = DEFAULT_BROKER_URL
# pubsub.topics[1].url = tcp://192.168.99.100:61616
# #pubsub.topics[1].clientId = Metasolver-Metric-Value-Monitor-Bean-client
# pubsub.topics[1].type = SCALE

#### New solutions must have utilities at least '1.1' times higher than the utility of the deployed solution
utility-threshold-factor=1.1
#### Default solver
default-solver=CPSOLVER

#### CP Model Update interval (in millis)
#cpModelUpdateEnabled = false
cpModelUpdateInterval = 30000

#### Debug events settings
#debugEvents.enabled=false
#debugEvents.topicName=metasolver_debug
#debugEvents.url=
#debugEvents.username=
#debugEvents.password=
#debugEvents.certificate=
#debugEvents.clientId=

#### Prediction processing settings
predictionMonitoringEnabled = true
#predictionTopicFormatter = prediction.%s
#predictionTopicPattern = ^prediction\.(.+)$
predictionRegistryCleanupRate = 60000
#predictionRegistryCleanupAfterScaleEvent = false

reconfigurationProbabilityThreshold = 0.5
#reconfigurationBlockingPeriod = 600000
#preventConcurrentReconfigurations = false
#preventConcurrentReconfigurationsTimeout = -1L

### logback configuration ###
logging.config=file:${MELODIC_CONFIG_DIR}/logback-conf/logback-spring.xml